nextest-version = "0.9.100"

[profile.default]
fail-fast = false
test-threads = "num-cpus"
status-level = "pass"
final-status-level = "slow"
failure-output = "immediate-final"
success-output = "never"

[profile.ci]
inherits = "default"
status-level = "slow"
final-status-level = "slow"

[profile.ci.junit]
path = "junit.xml"

# Cargo runs integration test binaries one after another, and these binaries
# also use process-local mutexes to serialize Hermit executions. Nextest runs
# each test in a separate process, so keep their shared contract explicit.
[test-groups.hermit-serialized]
max-threads = 1

[[profile.default.overrides]]
filter = '''
package(=hermit) & kind(=test) & (
    binary(=arbitrary_binaries) |
    binary(=clock_determinism) |
    binary(=epoll_determinism) |
    binary(=hermit_modes) |
    binary(=mmap_determinism) |
    binary(=record_replay) |
    binary(=signal_determinism) |
    binary(=stress_suite)
)'''
test-group = "hermit-serialized"
