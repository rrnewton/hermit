name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  NEXTEST_VERSION: "0.9.100"
  RUSTFLAGS: -D warnings -C link-arg=-llzma
  RUSTDOCFLAGS: -D warnings

jobs:
  regular:
    name: Regular tests (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Dependencies
      run: sudo apt-get install -y libunwind-dev liblzma-dev
    - name: Install cargo-nextest
      run: cargo install cargo-nextest --locked --version "$NEXTEST_VERSION"
    - name: Build
      run: cargo build --workspace
    - name: Test regular workspace crates
      run: >-
        cargo nextest run --profile ci --workspace
        --exclude detcore
        --exclude hermit
        --exclude hermetic_infra_hermit_flaky-tests
    - name: Upload nextest JUnit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextest-junit-${{ github.job }}
        path: target/nextest/ci/junit.xml
        if-no-files-found: warn
        retention-days: 14
    - name: Test Hermit without namespace-dependent integration tests
      run: cargo test -p hermit --lib --bins
    - name: Test Detcore without hardware-dependent integration tests
      run: cargo test -p detcore --lib --bins
    - name: Documentation
      run: |
        cargo test --workspace --doc
        cargo doc --workspace --no-deps
    - name: Rust components
      run: rustup component add clippy rustfmt
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Format
      run: cargo fmt --all -- --check

  hardware:
    name: Host-dependent tests (self-hosted)
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login == 'rrnewton'
        )
      }}
    runs-on: [self-hosted, Linux, X64, hermit, pmu]
    timeout-minutes: 10
    env:
      DETCORE_TEST_RUST_LOG: "off"

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v5
      with:
        go-version: stable
        cache: false
    - name: Dependencies
      run: |
        # libunwind + lzma are required for linking (RUSTFLAGS=-C link-arg=-llzma).
        # A Go toolchain is OPTIONAL: hermit-cli/tests/arbitrary_binaries.rs skips
        # the `go` tool when the binary is absent, so no test needs it. The
        # self-hosted runner has apt (no dnf) but cannot locate `golang-go`, which
        # previously failed the whole job. Install the required libs and treat Go
        # as best-effort so a missing golang package no longer blocks CI.
        if command -v dnf >/dev/null; then
          sudo dnf install -y libunwind-devel redis sqlite xz-devel
          sudo dnf install -y golang || echo "::notice::golang unavailable; skipping optional Go toolchain"
        elif command -v apt-get >/dev/null; then
          sudo apt-get install -y libunwind-dev liblzma-dev redis-server redis-tools sqlite3
          sudo apt-get install -y golang-go || echo "::notice::golang-go unavailable; skipping optional Go toolchain"
        fi
    - name: CPUID and RDRAND/RDSEED tests
      run: |
        cargo test -p detcore --test tests_misc has_rdrand_without_detcore -- --exact
        cargo test -p detcore --test tests_misc rdrand_rdseed_is_masked -- --exact
    - name: PMU timing and miscellaneous tests
      run: |
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
        cargo test -p detcore --test tests_time -- --ignored --test-threads=4
    - name: PMU parallel futex tests
      run: >-
        cargo test -p detcore --test tests_parallelism futex_wait_parent
        -- --ignored --test-threads=3
    - name: PMU parallel memory tests
      run: |
        cargo test -p detcore --test tests_parallelism 'mem_race::' -- --ignored --test-threads=4
        cargo test -p detcore --test tests_parallelism 'mem_print_race::' -- --ignored --test-threads=4
    - name: Check mount namespace support
      id: namespaces
      run: |
        if unshare --user --map-root-user --pid --fork --uts --net --mount sh -c 'mount -t proc proc /proc && mount -t sysfs sysfs /sys && mount --bind /tmp /tmp && mount --make-rshared /tmp && umount /tmp' 2>/dev/null; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Mount namespaces unavailable; running Hermit unit tests only."
        fi
    - name: Stable Hermit tests including record/replay matrix
      if: steps.namespaces.outputs.available == 'true'
      run: |
        cargo test -p hermit --lib --bins
        for test in \
          arbitrary_binaries \
          cli \
          clock_determinism \
          epoll_determinism \
          mmap_determinism \
          procfs_determinism \
          signal_determinism
        do
          cargo test -p hermit --test "$test" -- --test-threads=1
        done
        cargo test -p hermit --test record_replay record_replay_matrix -- --exact --test-threads=1
        cargo test -p hermit --test hermit_modes strict_mode_matrix -- --exact --test-threads=1
    - name: Fail-closed Hermit test ratchet
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-fail-closed.sh
    - name: Working-envelope measurement and monotonicity gate
      if: steps.namespaces.outputs.available == 'true'
      # Runs the IDENTICAL measurement code path as `./validate.sh` (same probes,
      # same --strict/--verify/--detlog modes, same L4 stress reps, same
      # record/replay probe) so CI and local numbers match exactly. Emits the
      # {l1_pass,l2_pass,l3_pass,l4_pass,rr_pass,total} vector as JSON + human
      # summary and fails if any count regressed below the committed baseline
      # (envelope-baseline.json). To grow the envelope, a PR raises the baseline;
      # a PR that shrinks any count turns this step red.
      run: ./validate.sh --envelope-compare envelope-baseline.json
    - name: Debugger (gdb/lldb) integration tests
      if: steps.namespaces.outputs.available == 'true'
      run: ./tests/debugger/run_debugger_tests.sh
    - name: Hermit unit tests without mount namespaces
      if: steps.namespaces.outputs.available != 'true'
      run: cargo test -p hermit --lib --bins
    - name: Backend parity ratchet
      if: steps.namespaces.outputs.available == 'true'
      run: |
        python3 experiments/backend-parity_20260722/run_matrix.py --backend ptrace
        if target/debug/hermit run --help | grep -q -- '--backend'; then
          if [[ -r /dev/kvm && -w /dev/kvm ]]; then
            python3 experiments/backend-parity_20260722/run_matrix.py \
              --backend kvm --require-backend
          else
            echo "::notice::KVM parity blocked: /dev/kvm is not readable and writable"
          fi
          if [[ -n ${DYNAMORIO_HOME:-} && -n ${HERMIT_DRRUN:-} && -n ${HERMIT_DBI_CLIENT:-} ]]; then
            python3 experiments/backend-parity_20260722/run_matrix.py \
              --backend dbi --require-backend
          else
            echo "::notice::DBI parity blocked: DynamoRIO/client environment is not configured"
          fi
        else
          echo "::notice::DBI/KVM parity blocked: backend selector is not integrated yet"
        fi
    - name: Upload working-envelope JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: working-envelope-${{ github.job }}
        path: envelope.json
        if-no-files-found: warn
        retention-days: 14
