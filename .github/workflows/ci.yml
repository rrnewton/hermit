name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  NEXTEST_VERSION: "0.9.100"
  RUSTFLAGS: -D warnings -C link-arg=-llzma
  RUSTDOCFLAGS: -D warnings

# The test matrix is defined once in scripts/test-suite.sh and shared with the
# local validator (validate.sh). CI invokes named tiers from that script so the
# two can never drift:  validate.sh ──> scripts/test-suite.sh <── this workflow.
# The GitHub-hosted job runs the "portable" tiers; the self-hosted job runs the
# capability-gated "hardware" tiers.

jobs:
  regular:
    name: Regular tests (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Dependencies
      run: sudo apt-get install -y libunwind-dev liblzma-dev
    - name: Install cargo-nextest
      run: cargo install cargo-nextest --locked --version "$NEXTEST_VERSION"
    - name: Build
      run: ./scripts/test-suite.sh build
    - name: Test regular workspace crates
      run: ./scripts/test-suite.sh unit-regular
    - name: Upload nextest JUnit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextest-junit-${{ github.job }}
        path: target/nextest/ci/junit.xml
        if-no-files-found: warn
        retention-days: 14
    - name: Test Hermit without namespace-dependent integration tests
      run: ./scripts/test-suite.sh unit-hermit-bins
    - name: Test Detcore without hardware-dependent integration tests
      run: ./scripts/test-suite.sh unit-detcore-bins
    - name: Documentation
      run: ./scripts/test-suite.sh doctest doc
    - name: Rust components
      run: rustup component add clippy rustfmt
    - name: Clippy
      run: ./scripts/test-suite.sh clippy
    - name: Format
      run: ./scripts/test-suite.sh fmt

  hardware:
    name: Host-dependent tests (self-hosted)
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login == 'rrnewton'
        )
      }}
    runs-on: [self-hosted, Linux, X64, hermit, pmu]
    timeout-minutes: 30
    env:
      DETCORE_TEST_RUST_LOG: "off"

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - uses: actions/setup-go@v5
      with:
        go-version: stable
        cache: false
    - name: Dependencies
      run: |
        if command -v dnf >/dev/null; then
          sudo dnf install -y \
            libunwind-devel xz-devel redis sqlite busybox coreutils python3 nodejs \
            java-17-openjdk-headless golang curl wget git gcc gcc-c++ make cmake
        elif command -v apt-get >/dev/null; then
          sudo apt-get update
          sudo apt-get install -y \
            libunwind-dev liblzma-dev redis-server redis-tools sqlite3 busybox coreutils \
            python3 nodejs default-jre-headless golang-go curl wget git gcc g++ make cmake
        else
          echo "::error::No supported package manager; test dependencies cannot be installed."
          exit 1
        fi
    - name: CPUID and RDRAND/RDSEED tests
      run: ./scripts/test-suite.sh detcore-cpuid
    - name: PMU timing and miscellaneous tests
      run: ./scripts/test-suite.sh detcore-pmu
    - name: PMU parallel futex and memory tests
      run: ./scripts/test-suite.sh detcore-parallel
    - name: Require mount namespace support
      id: namespaces
      run: |
        if ! unshare --user --map-root-user --pid --fork --uts --net --mount sh -c 'mount -t proc proc /proc && mount -t sysfs sysfs /sys && mount --bind /tmp /tmp && mount --make-rshared /tmp && umount /tmp'; then
          echo "::error::Mount namespaces are required for Hermit integration tests."
          exit 1
        fi
        echo "available=true" >> "$GITHUB_OUTPUT"
    - name: Stable Hermit tests including record/replay matrix
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-suite.sh hermit-determinism hermit-matrices
    - name: Focused LevelDB strict determinism test
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-suite.sh leveldb
    - name: Fail-closed Hermit test ratchet
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-suite.sh ratchet
    - name: Debugger (gdb/lldb) integration tests
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-suite.sh debugger
    - name: rr syscall test suite
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-suite.sh rr-suite
    - name: Backend parity ratchet
      if: steps.namespaces.outputs.available == 'true'
      run: ./scripts/test-suite.sh backend-parity
