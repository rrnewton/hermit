name: Rust

on:
  push:
    branches: [ "main", "frontier" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NEXTEST_VERSION: "0.9.100"
  RUSTFLAGS: -D warnings -C link-arg=-llzma
  RUSTDOCFLAGS: -D warnings

jobs:
  regular:
    name: Regular tests (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Dependencies
      run: sudo apt-get install -y libunwind-dev liblzma-dev
    - name: Install cargo-nextest
      run: cargo install cargo-nextest --locked --version "$NEXTEST_VERSION"
    - name: Build
      run: cargo build --workspace
    - name: Test regular workspace crates
      run: >-
        cargo nextest run --profile ci --workspace
        --exclude detcore
        --exclude hermit
        --exclude hermetic_infra_hermit_flaky-tests
    - name: Upload nextest JUnit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextest-junit-${{ github.job }}
        path: target/nextest/ci/junit.xml
        if-no-files-found: warn
        retention-days: 14
    - name: Test Hermit without namespace-dependent integration tests
      run: cargo test -p hermit --lib --bins
    - name: Test Detcore without hardware-dependent integration tests
      run: |
        cargo test -p detcore --lib --bins
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
    - name: Documentation
      run: |
        cargo test --workspace --doc
        cargo doc --workspace --no-deps
    - name: Rust components
      run: rustup component add clippy rustfmt
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Format
      run: cargo fmt --all -- --check

  hardware:
    name: Host-dependent tests (self-hosted)
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login == 'rrnewton'
        )
      }}
    runs-on: [self-hosted, Linux, X64, hermit, pmu]
    timeout-minutes: 30
    env:
      DETCORE_TEST_RUST_LOG: "off"

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - uses: actions/setup-go@v5
      with:
        go-version: stable
        cache: false
    - name: Dependencies
      run: |
        if command -v apt-get >/dev/null; then
          sudo apt-get update
          sudo apt-get install -y \
            busybox cmake coreutils curl default-jre-headless g++ gcc git \
            liblzma-dev libunwind-dev make nodejs python3 sqlite3 wget
        elif command -v dnf >/dev/null; then
          sudo dnf install -y \
            busybox cmake coreutils curl gcc gcc-c++ git \
            java-17-openjdk-headless libunwind-devel make nodejs python3 \
            sqlite wget xz-devel
        else
          echo "::error::No supported package manager; test dependencies cannot be installed."
          exit 1
        fi
    - name: CPUID and RDRAND/RDSEED tests
      run: |
        cargo test -p detcore --test tests_misc has_rdrand_without_detcore -- --exact
        cargo test -p detcore --test tests_misc rdrand_rdseed_is_masked -- --exact
    - name: PMU timing and miscellaneous tests
      run: |
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
        # This concurrent global-clock probe hangs on the Threadripper runner;
        # it remains active in the source suite and passes on the EPYC host.
        cargo test -p detcore --test tests_time -- --skip rdtsc_observes_global_time --test-threads=1
    - name: PMU parallel futex tests
      run: >-
        cargo test -p detcore --test tests_parallelism futex_wait_parent
        -- --test-threads=3
    - name: PMU parallel memory tests
      run: |
        cargo test -p detcore --test tests_parallelism 'mem_race::' -- --test-threads=4
        cargo test -p detcore --test tests_parallelism 'mem_print_race::' -- --test-threads=4
    - name: Require mount namespace support
      run: |
        if ! unshare --user --map-root-user --pid --fork --uts --net --mount sh -c 'mount -t proc proc /proc && mount -t sysfs sysfs /sys && mount --bind /tmp /tmp && mount --make-rshared /tmp && umount /tmp'; then
          echo "::error::Mount namespaces are required for Hermit integration tests."
          exit 1
        fi
    - name: Stable Hermit tests including record/replay matrix
      run: |
        cargo test -p hermit --lib --bins
        for test in \
          arbitrary_binaries \
          cli \
          clock_determinism \
          epoll_determinism \
          mmap_determinism \
          no_silent_skips \
          procfs_determinism \
          signal_determinism
        do
          cargo test -p hermit --test "$test" -- --test-threads=1
        done
        cargo test -p hermit --test record_replay record_replay_matrix -- --exact --test-threads=1
        cargo test -p hermit --test hermit_modes strict_mode_matrix -- --exact --test-threads=1
    - name: Strict-mode hermit run smoke (L2 minimum standard)
      run: |
        # validate.sh runs every direct `hermit run` under --strict; mirror that
        # here so CI never green-lights a meaningless relaxed run. A relaxed run
        # proves nothing about determinism. Strict mode currently panics on the
        # rseq syscall glibc registers at startup (the dominant known-failure
        # class in hermit-cli/tests/fail_closed_known_failures.tsv), so tolerate
        # ONLY that tracked failure. Any other failure, or an unexpected success
        # (rseq now supported -> remove this exception), fails the job.
        cargo build -p hermit --bin hermit
        hermit_bin="$PWD/target/debug/hermit"
        strict_args=(run --strict --base-env=minimal --no-virtualize-cpuid --preemption-timeout=disabled)
        strict_check() {
          local name=$1; shift
          local log
          log=$(mktemp)
          if "$@" >"$log" 2>&1; then
            echo "::error::strict $name unexpectedly passed; rseq may now be supported -- remove the known-failure exception"
            cat "$log"
            return 1
          fi
          if grep -q 'unsupported syscall: Other(rseq' "$log"; then
            echo "::warning::strict $name: known failure (unsupported-syscall: Rseq)"
            return 0
          fi
          echo "::error::strict $name failed for an unexpected reason (not the tracked rseq known-failure)"
          cat "$log"
          return 1
        }
        strict_check "run smoke" \
          timeout 30s "$hermit_bin" "${strict_args[@]}" -- /bin/echo hermit-ci-strict-smoke
        strict_check "verify smoke" \
          timeout 30s "$hermit_bin" "${strict_args[@]}" --verify -- /bin/echo hermit-ci-strict-smoke
    - name: Fail-closed Hermit test ratchet
      run: ./scripts/test-fail-closed.sh
    - name: Build pinned LevelDB integration fixture
      run: >-
        ./hermit-cli/tests/prepare_leveldb.sh
        "${GITHUB_WORKSPACE}/target/hermit-leveldb-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        "${GITHUB_WORKSPACE}/target/hermit-leveldb-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
    - name: Focused LevelDB strict determinism test
      env:
        HERMIT_LEVELDB_BUILD_DIR: ${{ github.workspace }}/target/hermit-leveldb-build-${{ github.run_id }}-${{ github.run_attempt }}
      run: >-
        cargo test -p hermit --release --test leveldb
        focused_leveldb_tests_are_deterministic_under_strict
        -- --exact --test-threads=1
    - name: rr syscall test suite
      run: cargo test -p hermit --test rr_suite -- --test-threads=1
