name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C link-arg=-llzma

jobs:
  regular:
    name: Regular tests (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Dependencies
      run: sudo apt-get install -y libunwind-dev liblzma-dev
    - name: Build
      run: cargo build --workspace
    - name: Test regular workspace crates
      run: >-
        cargo test --workspace
        --exclude detcore
        --exclude hermit
        --exclude hermetic_infra_hermit_flaky-tests
    - name: Test Hermit without namespace-dependent integration tests
      run: cargo test -p hermit --lib --bins
    - name: Test Detcore without hardware-dependent integration tests
      run: |
        cargo test -p detcore --lib --bins
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
    - name: Documentation tests
      run: cargo test --workspace --doc
    - name: Rust components
      run: rustup component add clippy rustfmt
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Format
      run: cargo fmt --all -- --check

  hardware:
    name: Host-dependent tests (self-hosted)
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login == 'rrnewton'
        )
      }}
    runs-on: [self-hosted, Linux, X64, hermit, pmu]
    timeout-minutes: 30
    env:
      DETCORE_TEST_RUST_LOG: "off"

    steps:
    - uses: actions/checkout@v3
    - name: Dependencies
      run: |
        if command -v dnf >/dev/null; then
          sudo dnf install -y \
            libunwind-devel xz-devel busybox coreutils python3 nodejs \
            java-17-openjdk-headless golang curl wget git gcc make cmake sqlite
        elif command -v apt-get >/dev/null; then
          sudo apt-get update
          sudo apt-get install -y \
            libunwind-dev liblzma-dev busybox coreutils python3 nodejs \
            default-jre-headless golang-go curl wget git gcc make cmake sqlite3
        else
          echo "::error::No supported package manager; test dependencies cannot be installed."
          exit 1
        fi
    - name: CPUID and RDRAND/RDSEED tests
      run: |
        cargo test -p detcore --test tests_misc has_rdrand_without_detcore -- --exact
        cargo test -p detcore --test tests_misc rdrand_rdseed_is_masked -- --exact
    - name: PMU timing and miscellaneous tests
      run: |
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
        cargo test -p detcore --test tests_time -- --test-threads=4
    - name: PMU parallel futex tests
      run: >-
        cargo test -p detcore --test tests_parallelism futex_wait_parent
        -- --test-threads=3
    - name: PMU parallel memory tests
      run: |
        cargo test -p detcore --test tests_parallelism 'mem_race::' -- --test-threads=4
        cargo test -p detcore --test tests_parallelism 'mem_print_race::' -- --test-threads=4
    - name: Require mount namespace support
      run: |
        if ! unshare --user --map-root-user --pid --fork --uts --mount sh -c 'mount -t proc proc /proc && mount --bind /tmp /tmp && mount --make-rshared /tmp && umount /tmp'; then
          echo "::error::Mount namespaces are required for Hermit integration tests."
          exit 1
        fi
    - name: Hermit tests including record/replay and stress matrices
      run: cargo test -p hermit -- --test-threads=1
