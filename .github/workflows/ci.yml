name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C link-arg=-llzma

jobs:
  regular:
    name: Regular tests (GitHub-hosted)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Dependencies
      run: sudo apt-get install -y libunwind-dev liblzma-dev
    - name: Build
      run: cargo build --workspace
    - name: Test regular workspace crates
      run: >-
        cargo test --workspace
        --exclude detcore
        --exclude hermit
        --exclude hermetic_infra_hermit_flaky-tests
    - name: Test Hermit without namespace-dependent integration tests
      run: cargo test -p hermit --lib --bins
    - name: Test Detcore without hardware-dependent integration tests
      run: |
        cargo test -p detcore --lib --bins
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
    - name: Documentation tests
      run: cargo test --workspace --doc
    - name: Rust components
      run: rustup component add clippy rustfmt
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Format
      run: cargo fmt --all -- --check

  hardware:
    name: Host-dependent tests (self-hosted)
    runs-on: [self-hosted, Linux, X64, hermit, pmu]
    timeout-minutes: 10
    env:
      DETCORE_TEST_RUST_LOG: "off"

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v5
      with:
        go-version: stable
        cache: false
    - name: Dependencies
      run: |
        if command -v apt-get >/dev/null; then
          sudo apt-get install -y libunwind-dev liblzma-dev
        else
          sudo dnf install -y libunwind-devel xz-devel
        fi
    - name: CPUID and RDRAND/RDSEED tests
      run: |
        cargo test -p detcore --test tests_misc has_rdrand_without_detcore -- --exact
        cargo test -p detcore --test tests_misc rdrand_rdseed_is_masked -- --exact
    - name: PMU timing and miscellaneous tests
      run: |
        cargo test -p detcore --test tests_misc getrandom_intercepted -- --exact
        cargo test -p detcore --test tests_time -- --ignored --test-threads=4
    - name: PMU parallel futex tests
      run: >-
        cargo test -p detcore --test tests_parallelism futex_wait_parent
        -- --ignored --test-threads=3
    - name: PMU parallel memory tests
      run: |
        cargo test -p detcore --test tests_parallelism 'mem_race::' -- --ignored --test-threads=4
        cargo test -p detcore --test tests_parallelism 'mem_print_race::' -- --ignored --test-threads=4
    - name: Check mount namespace support
      id: namespaces
      run: |
        if unshare --user --map-root-user --pid --fork --uts --mount sh -c 'mount -t proc proc /proc && mount --bind /tmp /tmp && mount --make-rshared /tmp && umount /tmp' 2>/dev/null; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Mount namespaces unavailable; running Hermit unit tests only."
        fi
    - name: Hermit tests including record/replay matrix
      if: steps.namespaces.outputs.available == 'true'
      run: cargo test -p hermit
    - name: PMU Detcore lit tests
      if: steps.namespaces.outputs.available == 'true'
      run: cargo test -p hermit --test detcore_lit -- --ignored --test-threads=1
    - name: PMU chaos and verify tests
      if: steps.namespaces.outputs.available == 'true'
      run: cargo test -p hermit --test chaos_verify -- --ignored --test-threads=1
    - name: Hermit unit tests without mount namespaces
      if: steps.namespaces.outputs.available != 'true'
      run: cargo test -p hermit --lib --bins
